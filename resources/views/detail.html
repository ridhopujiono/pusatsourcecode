<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Produk | Pusat Source Code</title>
  <meta name="description" content="Detail source code aplikasi di Pusat Source Code." />
  <style>
    :root {
      --bg: #f7f8fc;
      --surface: #ffffff;
      --text: #14213d;
      --muted: #5d6b82;
      --primary: #0f766e;
      --primary-dark: #0b5f59;
      --border: #d9e0ee;
      --shadow: 0 14px 36px rgba(20, 33, 61, 0.09);
      --radius: 16px;
      --success: #25d366;
      --max-width: 960px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Plus Jakarta Sans", "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--text);
      line-height: 1.6;
      background:
        radial-gradient(circle at 9% 8%, #dcfff2 0%, transparent 35%),
        radial-gradient(circle at 92% 14%, #ffecc6 0%, transparent 35%),
        linear-gradient(180deg, #f6fbff 0%, #f7f8fc 100%);
    }

    .container {
      width: min(100% - 2rem, var(--max-width));
      margin-inline: auto;
    }

    .topbar {
      padding: 1.2rem 0 0.4rem;
    }

    .back-link {
      display: inline-flex;
      text-decoration: none;
      color: #1e3a8a;
      font-weight: 700;
      border: 1px solid #cbd7f1;
      background: #eef4ff;
      border-radius: 10px;
      padding: 0.56rem 0.9rem;
      transition: all 0.2s ease;
    }

    .back-link:hover {
      transform: translateY(-1px);
      background: #e2ecff;
    }

    .detail-card {
      margin: 1rem 0 2.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.2rem;
      animation: fadeUp 0.45s ease both;
    }

    .heading-row {
      display: flex;
      gap: 0.6rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .category {
      background: #fff2dc;
      border: 1px solid #ffe0a8;
      color: #9a5800;
      padding: 0.2rem 0.56rem;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.74rem;
    }

    .updated {
      color: #64748b;
      font-size: 0.78rem;
      font-weight: 600;
    }

    h1 {
      margin: 0.7rem 0 0.6rem;
      font-size: clamp(1.6rem, 3vw, 2.3rem);
      line-height: 1.2;
    }

    .description {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .price-box {
      margin: 1rem 0;
      padding: 0.8rem 0.95rem;
      background: #ebfff5;
      border: 1px solid #c6f2dd;
      border-radius: 12px;
    }

    .price-label {
      margin: 0;
      color: #206049;
      font-size: 0.86rem;
      font-weight: 600;
    }

    .price-value {
      margin: 0.25rem 0 0;
      color: #0f5132;
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1.2;
    }

    .tech-list,
    .feature-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin: 0.7rem 0 0;
      padding: 0;
      list-style: none;
    }

    .feature-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.55rem;
    }

    .tag {
      font-size: 0.78rem;
      font-weight: 700;
      border: 1px solid #d8e1f5;
      color: #1d3557;
      background: #eff4ff;
      border-radius: 999px;
      padding: 0.22rem 0.58rem;
    }

    .feature-item {
      border: 1px solid #dde7f8;
      background: #f5f9ff;
      border-radius: 10px;
      padding: 0.68rem 0.82rem;
      color: #334155;
      font-size: 0.92rem;
      font-weight: 600;
    }

    .info-grid {
      margin-top: 1rem;
      display: grid;
      grid-template-columns: repeat(1, minmax(0, 1fr));
      gap: 0.8rem;
    }

    .info-card {
      border: 1px solid #e1e8f7;
      background: #fbfdff;
      border-radius: 12px;
      padding: 0.75rem 0.85rem;
    }

    .info-card h3 {
      margin: 0 0 0.2rem;
      font-size: 0.9rem;
      color: #2a4365;
    }

    .info-card p {
      margin: 0;
      color: #4b5563;
      font-size: 0.9rem;
    }

    .actions {
      margin-top: 1.1rem;
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.6rem;
    }

    .btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 800;
      padding: 0.76rem 1rem;
      transition: all 0.2s ease;
    }

    .btn-buy {
      background: var(--success);
      color: #07281c;
    }

    .btn-buy:hover {
      transform: translateY(-2px);
      filter: brightness(0.95);
    }

    .btn-secondary {
      border: 1px solid #bfefe7;
      color: var(--primary-dark);
      background: #f2fdfb;
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      background: #e7fbf6;
    }

    .not-found {
      margin: 1.2rem 0 2rem;
      border: 1px dashed #b9c8e5;
      background: #f5f9ff;
      border-radius: var(--radius);
      padding: 1.2rem;
      text-align: center;
    }

    .not-found h2 {
      margin: 0 0 0.35rem;
    }

    .not-found p {
      margin: 0 0 0.9rem;
      color: var(--muted);
    }

    footer {
      padding: 0.3rem 0 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (min-width: 740px) {
      .detail-card {
        padding: 1.5rem;
      }

      .info-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .actions {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a class="back-link" href="index.html#katalog">← Kembali ke Katalog</a>
    </div>

    <main id="detail-root"></main>

    <footer>
      © <span id="year"></span> Pusat Source Code
    </footer>
  </div>

  <script src="products-data.js"></script>
  <script>
    const products = window.PSC_PRODUCTS || [];
    const root = document.getElementById("detail-root");
    const params = new URLSearchParams(window.location.search);
    const productId = Number(params.get("id"));

    function getWhatsappUrl(title) {
      const message = `Halo, saya tertarik untuk membeli source code ${title} yang ada di pusatsourcecode.site`;
      return `https://wa.me/6282257802227?text=${encodeURIComponent(message)}`;
    }

    function renderNotFound() {
      root.innerHTML = `
        <section class="not-found">
          <h2>Produk tidak ditemukan</h2>
          <p>ID produk tidak valid atau produk sudah tidak tersedia.</p>
          <a class="btn btn-secondary" href="index.html#katalog">Kembali ke Katalog</a>
        </section>
      `;
    }

    function renderProduct(product) {
      document.title = `${product.title} | Pusat Source Code`;
      const techTags = product.tech_stack.map((item) => `<li class="tag">${item}</li>`).join("");
      const features = product.features.map((item) => `<li class="feature-item">${item}</li>`).join("");

      root.innerHTML = `
        <article class="detail-card">
          <div class="heading-row">
            <span class="category">${product.category}</span>
            <span class="updated">Update terakhir: ${product.updated_at}</span>
          </div>
          <h1>${product.title}</h1>
          <p class="description">${product.description}</p>

          <div class="price-box">
            <p class="price-label">Harga source code</p>
            <p class="price-value">${product.price}</p>
          </div>

          <section>
            <h2>Tech Stack</h2>
            <ul class="tech-list">${techTags}</ul>
          </section>

          <section>
            <h2>Fitur Utama</h2>
            <ul class="feature-list">${features}</ul>
          </section>

          <section class="info-grid">
            <article class="info-card">
              <h3>Kategori</h3>
              <p>${product.category}</p>
            </article>
            <article class="info-card">
              <h3>Paket Delivery</h3>
              <p>${product.delivery}</p>
            </article>
          </section>

          <div class="actions">
            <a class="btn btn-buy" href="${getWhatsappUrl(product.title)}" target="_blank" rel="noopener noreferrer">Beli via WhatsApp</a>
            <a class="btn btn-secondary" href="index.html#katalog">Lihat Produk Lain</a>
          </div>
        </article>
      `;
    }

    const found = products.find((product) => product.id === productId);

    if (!found) {
      renderNotFound();
    } else {
      renderProduct(found);
    }

    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
